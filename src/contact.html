<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Mur du Souvenir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <!-- Conteneur pour la navbar -->
  <div id="navbar-container"></div>

  <main>
    <div class="contact-container">
      <div class="contact-info">
        <h3>Contactez-nous</h3>
        <div class="contact-details">
          <div class="contact-item">
            <i class="fas fa-envelope"></i>
            <a href="mailto:contact@murdusouvenir.fr">contact@murdusouvenir.fr</a>
          </div>
        </div>
      </div>

      <div class="contact-form">
        <h3>Envoyez-nous un message</h3>
        <form id="contactForm">
          <div class="form-group">
            <label for="name">Nom</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="subject">Sujet</label>
            <input type="text" id="subject" name="subject" required>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" required></textarea>
          </div>
          <button type="submit" class="submit-button">Envoyer</button>
        </form>
      </div>
    </div>
  </main>

  <!-- Conteneur pour le footer -->
  <div id="footer-container"></div>

  <!-- Script pour les composants -->
  <script src="./js/components.js"></script>

  <script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      // Ici, vous pouvez ajouter le code pour envoyer le formulaire
      alert('Message envoyé avec succès !');
      this.reset();
    });
  </script>
</body>
</html>
