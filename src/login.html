<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion - Mur du Souvenir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <!-- Conteneur pour la navbar -->
  <div id="navbar-container"></div>

  <main class="login-container">
    <div class="auth-container">
      <div class="auth-box">
        <div class="auth-tabs">
          <button class="tab-btn active" data-tab="login">Connexion</button>
          <button class="tab-btn" data-tab="register">Inscription</button>
        </div>

        <div class="auth-content">
          <!-- Formulaire de connexion -->
          <form id="loginForm" class="auth-form active">
            <div class="user-type-selector">
              <button type="button" class="type-btn active" data-type="famille">
                <i class="fas fa-user"></i>
                Famille
              </button>
              <button type="button" class="type-btn" data-type="synagogue">
                <i class="fas fa-synagogue"></i>
                Synagogue
              </button>
            </div>
            
            <div class="form-fields">
              <div class="form-group">
                <label for="login-email">Email</label>
                <div class="input-with-icon">
                  <i class="fas fa-envelope"></i>
                  <input type="email" id="login-email" name="email" required>
                </div>
              </div>
              
              <div class="form-group">
                <label for="login-password">Mot de passe</label>
                <div class="input-with-icon">
                  <i class="fas fa-lock"></i>
                  <input type="password" id="login-password" name="password" required>
                </div>
              </div>
              
              <div class="form-options">
                <label class="remember-me">
                  <input type="checkbox" id="remember" name="remember">
                  <span>Se souvenir de moi</span>
                </label>
                <a href="#" class="forgot-password">Mot de passe oublié ?</a>
              </div>
              
              <button type="submit" class="submit-button">Se connecter</button>
            </div>
          </form>
          
          <!-- Formulaire d'inscription -->
          <form id="registerForm" class="auth-form">
            <div class="user-type-selector">
              <button type="button" class="type-btn active" data-type="famille">
                <i class="fas fa-user"></i>
                Famille
              </button>
              <button type="button" class="type-btn" data-type="synagogue">
                <i class="fas fa-synagogue"></i>
                Synagogue
              </button>
            </div>
            
            <!-- Champs pour familles -->
            <div class="form-fields famille-fields">
              <div class="form-group">
                <label for="first-name">Prénom</label>
                <div class="input-with-icon">
                  <i class="fas fa-user"></i>
                  <input type="text" id="first-name" name="first-name" required>
                </div>
              </div>
              <div class="form-group">
                <label for="last-name">Nom</label>
                <div class="input-with-icon">
                  <i class="fas fa-user"></i>
                  <input type="text" id="last-name" name="last-name" required>
                </div>
              </div>
            </div>

            <!-- Champs communs -->
            <div class="form-fields">
              <div class="form-group">
                <label for="register-email">Email</label>
                <div class="input-with-icon">
                  <i class="fas fa-envelope"></i>
                  <input type="email" id="register-email" name="email" required>
                </div>
              </div>
              
              <div class="form-group">
                <label for="register-password">Mot de passe</label>
                <div class="input-with-icon">
                  <i class="fas fa-lock"></i>
                  <input type="password" id="register-password" name="password" required>
                </div>
              </div>
              
              <div class="form-group">
                <label for="confirm-password">Confirmer le mot de passe</label>
                <div class="input-with-icon">
                  <i class="fas fa-lock"></i>
                  <input type="password" id="confirm-password" name="confirm-password" required>
                </div>
              </div>
            </div>
            
            <!-- Champs pour synagogues -->
            <div class="form-fields synagogue-fields" style="display: none;">
              <div class="form-group">
                <label for="synagogue-name">Nom de la synagogue</label>
                <div class="input-with-icon">
                  <i class="fas fa-synagogue"></i>
                  <input type="text" id="synagogue-name" name="synagogue-name" required>
                </div>
              </div>
              <div class="form-group">
                <label for="address">Adresse</label>
                <div class="input-with-icon">
                  <i class="fas fa-map-marker-alt"></i>
                  <input type="text" id="address" name="address" required>
                </div>
              </div>
              <div class="form-group">
                <label for="phone">Téléphone</label>
                <div class="input-with-icon">
                  <i class="fas fa-phone"></i>
                  <input type="tel" id="phone" name="phone" required>
                </div>
              </div>
            </div>
            
            <div class="form-group">
              <label class="terms-check">
                <input type="checkbox" id="terms" name="terms" required>
                <span>J'accepte les <a href="conditions_utilisation">conditions d'utilisation</a> et la <a href="privacy">politique de confidentialité</a></span>
              </label>
            </div>
            
            <button type="submit" class="submit-button">S'inscrire</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <!-- Conteneur pour le footer -->
  <div id="footer-container"></div>

  <!-- Script pour les composants -->
  <script src="./js/components.js"></script>

  <script>
    // Gestion des onglets
    const tabButtons = document.querySelectorAll('.tab-btn');
    const authForms = document.querySelectorAll('.auth-form');
    const typeButtons = document.querySelectorAll('.type-btn');
    const familleFields = document.querySelector('.famille-fields');
    const synagogueFields = document.querySelector('.synagogue-fields');

    tabButtons.forEach(button => {
      button.addEventListener('click', () => {
        const tab = button.dataset.tab;
        
        // Mettre à jour les onglets
        tabButtons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        
        // Afficher le formulaire correspondant
        authForms.forEach(form => {
          form.classList.remove('active');
          if (form.id === `${tab}Form`) {
            form.classList.add('active');
          }
        });
      });
    });
    
    // Gestion du type d'utilisateur
    typeButtons.forEach(button => {
      button.addEventListener('click', () => {
        const type = button.dataset.type;
        
        // Mettre à jour les boutons de type
        typeButtons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        
        // Afficher les champs correspondants
        if (type === 'famille') {
          familleFields.style.display = 'block';
          synagogueFields.style.display = 'none';
        } else {
          familleFields.style.display = 'none';
          synagogueFields.style.display = 'block';
        }
      });
    });
    
    // Gestion de la soumission du formulaire de connexion
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const userType = document.querySelector('.user-type-selector .type-btn.active').dataset.type;
      
      // Stockage des informations de connexion
      localStorage.setItem('isAuthenticated', 'true');
      localStorage.setItem('userType', userType);
      
      // Redirection vers la page appropriée
      redirectAfterLogin();
    });
  </script>
</body>
</html>
