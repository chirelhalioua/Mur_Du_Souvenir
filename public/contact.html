<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Mur du Souvenir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    :root {
      --beige: #F5F5DC;
      --dark-brown: #8B4513;
      --light-brown: #A0522D;
      --cream: #FFF8DC;
      --white: #FFFFFF;
      --text-color: #333333;
      --accent-color: #8B4513;
      --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      --transition: all 0.3s ease;
      --heading-font: 'Playfair Display', serif;
      --body-font: 'Poppins', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--body-font);
      background-color: var(--white);
    }

    main {
      min-height: calc(100vh - 200px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .contact-container {
      max-width: 1000px;
      margin: 3rem auto;
      padding: 2rem;
      background: var(--cream);
      border-radius: 15px;
      box-shadow: var(--shadow);
    }

    .contact-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .contact-header h2 {
      font-family: var(--heading-font);
      font-size: 2.2rem;
      color: var(--accent-color);
      margin-bottom: 1rem;
    }

    .contact-header p {
      font-size: 1rem;
      color: var(--text-color);
      max-width: 600px;
      margin: 0 auto;
    }

    .contact-content {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .contact-form {
      background: rgba(255, 255, 255, 0.95);
      padding: 2rem;
      border-radius: 10px;
      border: 1px solid var(--accent-color);
    }

    .contact-form h3 {
      font-family: var(--heading-font);
      font-size: 1.8rem;
      color: var(--accent-color);
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .contact-form form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    .form-group label {
      font-size: 0.9rem;
      color: var(--text-color);
      margin-bottom: 0.5rem;
    }

    .form-group input,
    .form-group textarea {
      padding: 0.8rem;
      border: 1px solid #e9ecef;
      border-radius: 8px;
      font-size: 1rem;
      transition: var(--transition);
      background: var(--white);
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--accent-color);
      outline: none;
      box-shadow: 0 0 5px rgba(139, 69, 19, 0.3);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 120px;
    }

    .submit-button {
      padding: 0.8rem 2rem;
      background: var(--accent-color);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      grid-column: 1 / -1;
      justify-self: center;
    }

    .submit-button:hover {
      background: var(--light-brown);
      transform: translateY(-2px);
    }

    .contact-info {
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 1.5rem;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 10px;
      border: 1px solid var(--accent-color);
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 1rem;
      color: var(--text-color);
    }

    .contact-item i {
      font-size: 1.2rem;
      color: var(--accent-color);
    }

    .contact-item a {
      color: var(--accent-color);
      text-decoration: none;
      transition: var(--transition);
    }

    .contact-item a:hover {
      color: var(--light-brown);
      text-decoration: underline;
    }

    /* Responsive Design */
    @media (max-width: 992px) {
      .contact-form form {
        grid-template-columns: 1fr;
      }

      .contact-info {
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
    }

    @media (max-width: 576px) {
      .contact-container {
        padding: 1rem;
        margin: 1.5rem auto;
      }

      .contact-form {
        padding: 1.5rem;
      }

      .contact-header h2 {
        font-size: 1.8rem;
      }

      .contact-form h3 {
        font-size: 1.5rem;
      }

      .form-group input,
      .form-group textarea {
        padding: 0.6rem;
        font-size: 0.9rem;
      }

      .submit-button {
        padding: 0.7rem 1.5rem;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main>
    <div class="contact-container">
      <div class="contact-header">
        <h2>Contactez-nous</h2>
        <p>Nous sommes là pour répondre à vos questions. Remplissez le formulaire ci-dessous ou utilisez notre adresse e-mail pour nous contacter directement.</p>
      </div>
      <div class="contact-content">
        <div class="contact-info">
          <div class="contact-item">
            <i class="fas fa-envelope"></i>
            <a href="mailto:contact@murdusouvenir.fr">contact@murdusouvenir.fr</a>
          </div>
        </div>
        <div class="contact-form">
          <h3>Envoyez-nous un message</h3>
          <form id="contactForm">
            <div class="form-group">
              <label for="name">Nom</label>
              <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group full-width">
              <label for="subject">Sujet</label>
              <input type="text" id="subject" name="subject" required>
            </div>
            <div class="form-group full-width">
              <label for="message">Message</label>
              <textarea id="message" name="message" required></textarea>
            </div>
            <button type="submit" class="submit-button">Envoyer</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="./js/components.js"></script>
  <script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Message envoyé avec succès !');
      this.reset();
    });
  </script>
</body>
</html>
