<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion - Mur du Souvenir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css" />
</head>

  <style>
    :root {
      --beige: #F5F5DC;
      --dark-brown: #8B4513;
      --light-brown: #A0522D;
      --cream: #FFF8DC;
      --white: #FFFFFF;
      --text-color: #333333;
      --accent-color: #8B4513;
      --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      --transition: all 0.3s ease;
      --heading-font: 'Playfair Display', serif;
      --body-font: 'Poppins', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--body-font);
      background-color: var(--white);
    }

    main {
      min-height: calc(100vh - 200px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-container {
      max-width: 1000px;
      margin: 3rem auto;
      padding: 2rem;
      background: var(--cream);
      border-radius: 15px;
      box-shadow: var(--shadow);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-header h2 {
      font-family: var(--heading-font);
      font-size: 2.2rem;
      color: var(--accent-color);
      margin-bottom: 1rem;
    }

    .auth-header p {
      font-size: 1rem;
      color: var(--text-color);
      max-width: 600px;
      margin: 0 auto;
    }

    .auth-content {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .auth-tabs {
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 10px;
      border: 1px solid var(--accent-color);
    }

    .tab-btn {
      padding: 0.8rem 2rem;
      background: none;
      border: none;
      font-family: var(--heading-font);
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text-color);
      cursor: pointer;
      transition: var(--transition);
      border-radius: 8px;
    }

    .tab-btn.active {
      background: var(--accent-color);
      color: var(--white);
    }

    .tab-btn:hover {
      background: var(--light-brown);
      color: var(--white);
    }

    .auth-form {
      display: none;
      background: rgba(255, 255, 255, 0.95);
      padding: 2rem;
      border-radius: 10px;
      border: 1px solid var(--accent-color);
    }

    .auth-form.active {
      display: block;
    }

    .auth-form h3 {
      font-family: var(--heading-font);
      font-size: 1.8rem;
      color: var(--accent-color);
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .user-type-selector {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .type-btn {
      flex: 1;
      padding: 0.8rem;
      background: var(--white);
      border: 1px solid var(--accent-color);
      border-radius: 8px;
      font-size: 1rem;
      color: var(--accent-color);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .type-btn.active {
      background: var(--accent-color);
      color: var(--white);
      border-color: var(--accent-color);
    }

    .type-btn:hover {
      background: var(--light-brown);
      color: var(--white);
    }

    .form-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .form-fields.famille-fields,
    .form-fields.synagogue-fields {
      display: none;
    }

    .form-fields.famille-fields.active,
    .form-fields.synagogue-fields.active {
      display: grid;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    .form-group label {
      font-size: 0.9rem;
      color: var(--text-color);
      margin-bottom: 0.5rem;
    }

    .input-with-icon {
      position: relative;
    }

    .input-with-icon i {
      position: absolute;
      top: 50%;
      left: 12px;
      transform: translateY(-50%);
      color: var(--accent-color);
      font-size: 1rem;
    }

    .form-group input,
    .form-group textarea {
      padding: 0.8rem 0.8rem 0.8rem 2.5rem;
      border: 1px solid #e9ecef;
      border-radius: 8px;
      font-size: 1rem;
      transition: var(--transition);
      background: var(--white);
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--accent-color);
      outline: none;
      box-shadow: 0 0 5px rgba(139, 69, 19, 0.3);
    }

    .form-options {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 1.5rem 0;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: var(--text-color);
    }

    .remember-me input[type="checkbox"] {
      accent-color: var(--accent-color);
    }

    .forgot-password {
      color: var(--accent-color);
      text-decoration: none;
      font-size: 0.9rem;
      transition: var(--transition);
    }

    .forgot-password:hover {
      color: var(--light-brown);
      text-decoration: underline;
    }

    .terms-check {
      grid-column: 1 / -1;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: var(--text-color);
      margin: 1rem 0;
    }

    .terms-check input[type="checkbox"] {
      margin-top: 3px;
      accent-color: var(--accent-color);
    }

    .terms-check a {
      color: var(--accent-color);
      text-decoration: none;
      transition: var(--transition);
    }

    .terms-check a:hover {
      color: var(--light-brown);
      text-decoration: underline;
    }

    .submit-button {
      padding: 0.8rem 2rem;
      background: var(--accent-color);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      grid-column: 1 / -1;
      justify-self: center;
    }

    .submit-button:hover {
      background: var(--light-brown);
      transform: translateY(-2px);
    }

    /* Responsive Design */
    @media (max-width: 992px) {
      .form-fields {
        grid-template-columns: 1fr;
      }

      .user-type-selector {
        flex-direction: column;
      }

      .type-btn {
        width: 100%;
      }
    }

    @media (max-width: 576px) {
      .auth-container {
        padding: 1rem;
        margin: 1.5rem auto;
      }

      .auth-form {
        padding: 1.5rem;
      }

      .auth-header h2 {
        font-size: 1.8rem;
      }

      .auth-form h3 {
        font-size: 1.5rem;
      }

      .form-group input,
      .form-group textarea {
        padding: 0.6rem 0.6rem 0.6rem 2rem;
        font-size: 0.9rem;
      }

      .submit-button {
        padding: 0.7rem 1.5rem;
        font-size: 0.9rem;
      }

      .tab-btn {
        padding: 0.6rem 1rem;
        font-size: 0.9rem;
      }
    }
  </style>

  <body>
  <div id="navbar-container"></div>

  <main>
    <div class="auth-container">
      <div class="auth-header">
        <h2>Connexion / Inscription</h2>
        <p>Connectez-vous à votre compte ou créez-en un pour accéder à nos services.</p>
      </div>
      <div class="auth-content">
        <div class="auth-tabs">
          <button class="tab-btn active" data-tab="login">Connexion</button>
          <button class="tab-btn" data-tab="register">Inscription</button>
        </div>
        <form id="loginForm" class="auth-form active">
          <h3>Connexion</h3>
          <div class="user-type-selector">
            <button type="button" class="type-btn active" data-type="famille">
              <i class="fas fa-user"></i>
              Famille
            </button>
            <button type="button" class="type-btn" data-type="synagogue">
              <i class="fas fa-synagogue"></i>
              Synagogue
            </button>
          </div>
          <div class="form-fields">
            <div class="form-group">
              <label for="login-email">Email</label>
              <div class="input-with-icon">
                <i class="fas fa-envelope"></i>
                <input type="email" id="login-email" name="email" required>
              </div>
            </div>
            <div class="form-group">
              <label for="login-password">Mot de passe</label>
              <div class="input-with-icon">
                <i class="fas fa-lock"></i>
                <input type="password" id="login-password" name="password" required>
              </div>
            </div>
            <div class="form-options">
              <label class="remember-me">
                <input type="checkbox" id="remember" name="remember">
                <span>Se souvenir de moi</span>
              </label>
              <a href="#" class="forgot-password">Mot de passe oublié ?</a>
            </div>
            <button type="submit" class="submit-button">Se connecter</button>
          </div>
        </form>
        <form id="registerForm" class="auth-form">
          <h3>Inscription</h3>
          <div class="user-type-selector">
            <button type="button" class="type-btn active" data-type="famille">
              <i class="fas fa-user"></i>
              Famille
            </button>
            <button type="button" class="type-btn" data-type="synagogue">
              <i class="fas fa-synagogue"></i>
              Synagogue
            </button>
          </div>
          <div class="form-fields famille-fields active">
            <div class="form-group">
              <label for="first-name">Prénom</label>
              <div class="input-with-icon">
                <i class="fas fa-user"></i>
                <input type="text" id="first-name" name="first-name" required>
              </div>
            </div>
            <div class="form-group">
              <label for="last-name">Nom</label>
              <div class="input-with-icon">
                <i class="fas fa-user"></i>
                <input type="text" id="last-name" name="last-name" required>
              </div>
            </div>
          </div>
          <div class="form-fields">
            <div class="form-group">
              <label for="register-email">Email</label>
              <div class="input-with-icon">
                <i class="fas fa-envelope"></i>
                <input type="email" id="register-email" name="email" required>
              </div>
            </div>
            <div class="form-group">
              <label for="register-password">Mot de passe</label>
              <div class="input-with-icon">
                <i class="fas fa-lock"></i>
                <input type="password" id="register-password" name="password" required>
              </div>
            </div>
            <div class="form-group full-width">
              <label for="confirm-password">Confirmer le mot de passe</label>
              <div class="input-with-icon">
                <i class="fas fa-lock"></i>
                <input type="password" id="confirm-password" name="confirm-password" required>
              </div>
            </div>
          </div>
          <div class="form-fields synagogue-fields">
            <div class="form-group">
              <label for="synagogue-name">Nom de la synagogue</label>
              <div class="input-with-icon">
                <i class="fas fa-synagogue"></i>
                <input type="text" id="synagogue-name" name="synagogue-name" required>
              </div>
            </div>
            <div class="form-group">
              <label for="address">Adresse</label>
              <div class="input-with-icon">
                <i class="fas fa-map-marker-alt"></i>
                <input type="text" id="address" name="address" required>
              </div>
            </div>
            <div class="form-group full-width">
              <label for="phone">Téléphone</label>
              <div class="input-with-icon">
                <i class="fas fa-phone"></i>
                <input type="tel" id="phone" name="phone" required>
              </div>
            </div>
          </div>
          <div class="terms-check">
            <input type="checkbox" id="terms" name="terms" required>
            <span>J'accepte les <a href="conditions_utilisation">conditions d'utilisation</a> et la <a href="privacy">politique de confidentialité</a></span>
          </div>
          <button type="submit" class="submit-button">S'inscrire</button>
        </form>
      </div>
    </div>
  </main>
  <div id="footer-container"></div>

  <script>
    const tabButtons = document.querySelectorAll('.tab-btn');
    const authForms = document.querySelectorAll('.auth-form');
    const typeButtons = document.querySelectorAll('.type-btn');
    const familleFields = document.querySelector('.famille-fields');
    const synagogueFields = document.querySelector('.synagogue-fields');

    tabButtons.forEach(button => {
      button.addEventListener('click', () => {
        const tab = button.dataset.tab;
        tabButtons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        authForms.forEach(form => {
          form.classList.remove('active');
          if (form.id === `${tab}Form`) {
            form.classList.add('active');
          }
        });
      });
    });

    typeButtons.forEach(button => {
      button.addEventListener('click', () => {
        const type = button.dataset.type;
        typeButtons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        if (type === 'famille') {
          familleFields.classList.add('active');
          synagogueFields.classList.remove('active');
        } else {
          familleFields.classList.remove('active');
          synagogueFields.classList.add('active');
        }
      });
    });

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const userType = document.querySelector('.user-type-selector .type-btn.active').dataset.type;
      localStorage.setItem('isAuthenticated', 'true');
      localStorage.setItem('userType', userType);
      alert('Connexion réussie !');
      this.reset();
    });

    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Inscription réussie !');
      this.reset();
    });
  </script>

  <script src="./js/components.js"></script>
</body>
</html>
